# API calls ko aapke Live PHP Server par redirect karne ke liye
# DHYAN DEIN: https://your-live-domain.com ko apne real domain se replace karein!
[[redirects]]
  from = "/api/*"
  to = "https://www.panyaglobalmovers.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://www.panyaglobalmovers.com/uploads/:splat"
  status = 200
  force = true

# React Router ko handle karne ke liye (Page refresh error fix)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

